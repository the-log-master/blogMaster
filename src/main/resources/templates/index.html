<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/base_layout}">
<head>
    <title>메인 페이지</title>
</head>
<body>

<!-- 본문 내용 (index.html 등에서 채워짐) -->
<!-- .mx-auto.mt-4 대신 공백으로 구분한 클래스명을 사용하세요 -->
<div class="container mx-auto p-4" layout:fragment="contents">

    <!-- 검색창 영역 -->
    <div class="flex justify-end mb-4">
        <div class="join">
            <input class="input input-bordered join-item" placeholder="검색어를 입력하세요" />
            <button class="btn btn-primary join-item">검색</button>
        </div>
    </div>

    <!-- 게시판 목록 테이블 -->
    <div class="overflow-x-auto">
        <table class="table w-full">
            <thead>
            <tr>
                <th>번호</th>
                <th>제목</th>
                <th>작성자</th>
                <th>작성일</th>
                <th>조회수</th>
            </tr>
            </thead>
            <tbody>
            <tr class="hover">
                <th>3</th>
                <td><a href="#" class="link link-hover font-semibold">DaisyUI로 게시판을 만들어 보았습니다.</a></td>
                <td>홍길동</td>
                <td>2026-05-04</td>
                <td>42</td>
            </tr>
            <tr class="hover">
                <th>2</th>
                <td><a href="#" class="link link-hover font-semibold">Tailwind CSS와 DaisyUI의 조합</a></td>
                <td>김철수</td>
                <td>2026-05-03</td>
                <td>128</td>
            </tr>
            <tr class="hover">
                <th>1</th>
                <td><a href="#" class="link link-hover font-semibold">게시판 첫 번째 글입니다.</a></td>
                <td>이영희</td>
                <td>2026-05-01</td>
                <td>256</td>
            </tr>
            </tbody>
        </table>
    </div>

    <!-- 페이지네이션 및 글쓰기 버튼 영역 -->
    <div class="flex justify-between items-center mt-6">
        <div></div> <!-- 빈 공간 -->

        <div class="join">
            <button class="join-item btn">«</button>
            <button class="join-item btn btn-active">1</button>
            <button class="join-item btn">2</button>
            <button class="join-item btn">3</button>
            <button class="join-item btn">4</button>
            <button class="join-item btn">»</button>
        </div>

        <a href="#" class="btn btn-primary">글쓰기</a>
    </div>

</div>
</body>
</html>
