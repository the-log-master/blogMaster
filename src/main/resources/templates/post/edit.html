<!DOCTYPE html>
<html lang="ko" layout:decorate="~{layouts/base_layout}"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>게시글 수정</title>
</head>
<body>

<!-- 본문 내용 (index.html 등에서 채워짐) -->
<!-- .mx-auto.mt-4 대신 공백으로 구분한 클래스명을 사용하세요 -->
<div class="container mx-auto p-4" layout:fragment="contents">

    <h1>게시글 수정</h1>

    <form method="post" th:action="@{/posts/{postId}/edit(postId=${post.id})}">

        <div>
            <label for="postName">제목</label>
            <input id="postName"
                   name="postName"
                   required
                   th:value="${post.postName}"
                   type="text">
        </div>

        <br>

        <div>
            <label for="categoryId">카테고리</label>

            <select id="categoryId" name="categoryId">
                <option th:selected="${selectedCategoryId == 0}"
                        value="0">
                    카테고리 없음
                </option>

                <option th:each="category : ${categories}"
                        th:if="${category.id != 0}"
                        th:selected="${category.id == selectedCategoryId}"
                        th:text="${category.categoryName}"
                        th:value="${category.id}">
                    카테고리명
                </option>
            </select>
        </div>

        <br>

        <div>
            <label>
                <input name="isOpen"
                       th:checked="${post.isOpen}"
                       type="checkbox">
                공개
            </label>
        </div>

        <br>

        <div>
            <label for="content">내용</label>
            <br>
            <textarea cols="80"
                      id="content"
                      name="content"
                      required
                      rows="10"
                      th:text="${post.content}"></textarea>
        </div>

        <br>

        <button type="submit">수정 완료</button>

    </form>

    <hr>

    <a th:href="@{/posts/{postId}(postId=${post.id})}">상세 화면으로 돌아가기</a>
    <a href="/posts">목록으로 이동</a>
</div>
</body>
</html>
