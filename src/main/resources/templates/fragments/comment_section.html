<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<body>

<div th:fragment="commentArea" class="mt-10">

    <div class="flex items-center gap-2 mb-6">
        <span class="text-2xl">💬</span>
        <h2 class="text-xl font-bold">
            댓글 (<span th:text="${comments.size()}">0</span>)
        </h2>
    </div>

    <!-- 원댓글 작성 -->
    <form th:action="@{/posts/{postId}/comments/add(postId=${postId})}"
          method="post"
          class="mb-6">

        <textarea name="content"
                  class="textarea textarea-bordered w-full"
                  placeholder="댓글을 입력하세요"
                  required></textarea>

        <button type="submit"
                class="btn btn-primary mt-2">
            댓글 작성
        </button>
    </form>

    <div th:if="${#lists.isEmpty(comments)}"
         class="text-gray-500">
        댓글이 없습니다.
    </div>

    <!-- 댓글 목록 -->
    <div th:each="comment, stat : ${comments}"
         th:style="'margin-left:' + (${comment.depth} * 36) + 'px'"
         class="border rounded-lg p-4 mb-4 bg-base-100 shadow">

        <div class="flex justify-between items-center mb-3">

            <div class="bg-gray-200 px-3 py-1 rounded text-sm font-semibold">
                익명 <span th:text="${stat.index + 1}">1</span>
            </div>

            <div class="text-sm text-gray-400">
                <span th:text="${#temporals.format(comment.createdAt, 'yyyy-MM-dd HH:mm')}">
                    작성 시간
                </span>
            </div>
        </div>

        <!-- 댓글 내용 -->
        <div th:id="'comment-content-' + ${comment.id}"
             class="text-base leading-relaxed my-4">
            <span th:text="${comment.content}">
                댓글 내용
            </span>
        </div>

        <!-- 버튼 영역 -->
        <div th:id="'comment-buttons-' + ${comment.id}"
             class="flex justify-end gap-2">

            <button type="button"
                    class="btn btn-sm"
                    th:attr="onclick=|openReply(${comment.id})|">
                답글
            </button>

            <button type="button"
                    class="btn btn-sm"
                    th:attr="onclick=|openEdit(${comment.id})|">
                수정
            </button>

            <form th:action="@{/posts/{postId}/comments/{commentId}/delete(postId=${postId}, commentId=${comment.id})}"
                  method="post"
                  onsubmit="return confirm('댓글을 삭제하시겠습니까?');">
                <button type="submit"
                        class="btn btn-sm btn-error">
                    삭제
                </button>
            </form>
        </div>

        <!-- 답글 작성 영역 -->
        <div th:id="'reply-area-' + ${comment.id}"
             style="display:none;"
             class="mt-4">

            <form th:action="@{/posts/{postId}/comments/{commentId}/reply(postId=${postId}, commentId=${comment.id})}"
                  method="post">

                <textarea name="content"
                          class="textarea textarea-bordered w-full"
                          rows="3"
                          placeholder="답글을 입력하세요"
                          required></textarea>

                <div class="flex justify-end gap-2 mt-2">
                    <button type="button"
                            class="btn btn-sm"
                            th:onclick="'closeReply(' + ${comment.id} + ')'">
                        취소
                    </button>

                    <button type="submit"
                            class="btn btn-sm btn-primary">
                        답글 작성
                    </button>
                </div>
            </form>
        </div>

        <!-- 수정 영역 -->
        <div th:id="'edit-area-' + ${comment.id}"
             style="display:none;"
             class="mt-4">

            <form th:action="@{/posts/{postId}/comments/{commentId}/update(postId=${postId}, commentId=${comment.id})}"
                  method="post">

                <textarea name="content"
                          class="textarea textarea-bordered w-full"
                          rows="4"
                          th:text="${comment.content}"></textarea>

                <div class="flex justify-end gap-2 mt-2">
                    <button type="button"
                            class="btn btn-sm"
                            th:onclick="'closeEdit(' + ${comment.id} + ')'">
                        취소
                    </button>

                    <button type="submit"
                            class="btn btn-success btn-sm">
                        수정 완료
                    </button>
                </div>
            </form>
        </div>

        <script th:inline ="javascript">
            function openEdit(id) {
                document.getElementById("comment-content-" + id).style.display = "none";
                document.getElementById("comment-buttons-" + id).style.display = "none";
                document.getElementById("edit-area-" + id).style.display = "block";
            }

            function closeEdit(id) {
                document.getElementById("comment-content-" + id).style.display = "block";
                document.getElementById("comment-buttons-" + id).style.display = "flex";
                document.getElementById("edit-area-" + id).style.display = "none";
            }

            function openReply(id) {
                document.getElementById("reply-area-" + id).style.display = "block";
            }

            function closeReply(id) {
                document.getElementById("reply-area-" + id).style.display = "none";
            }
        </script>

    </div>
</div>
