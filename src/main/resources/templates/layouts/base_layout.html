<!doctype html>
<html lang="en" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1" name="viewport">
    <title>Document</title>
    <th:block th:insert="~{fragments/common_headers::commonHeader}"></th:block>
</head>
<body class="min-h-screen flex flex-col">

<div class="drawer lg:drawer-open flex-grow">
    <!-- 이 ID("my-drawer")가 topbar의 버튼(for="my-drawer")과 연결됩니다 -->
    <input class="drawer-toggle" id="my-drawer" type="checkbox"/>

    <div class="drawer-content flex flex-col">
        <!-- 1. 상단 바 (여기에 삼지창 버튼이 들어있음) -->
        <div th:replace="~{fragments/common_topbar::common_topbar}"></div>

        <!-- 2. 본문 내용 -->
        <div class="container mx-auto p-6" layout:fragment="contents">

        </div>
    </div>

    <!-- 3. 사이드바 영역 -->
    <div class="drawer-side">
        <!-- 모바일에서 바깥 클릭 시 닫히게 하는 오버레이 -->
        <label aria-label="close sidebar" class="drawer-overlay" for="my-drawer"></label>
        <ul class="menu bg-base-200 text-base-content min-h-full w-80 p-4">

            <li class="menu-title"><span>Main</span></li>
            <li><a href="/posts">전체 게시판</a></li>

            <!-- 동적 메뉴 -->
            <li class="menu-title mt-4"><span>Categories</span></li>

            <div id="dynamic-category-list">

            </div>

            <!-- 관리-->
            <li class="menu-title mt-4"><span>Admin</span></li>
            <li>
                <button class="btn btn-outline btn-primary btn-sm mt-2" onclick="openCategoryModal()">
                    카테고리 관리
                </button>
            </li>
        </ul>
    </div>
</div>

<!-- 모든 페이지 공통 모달 추가 -->
<div th:replace="~{fragments/modals :: categoryModal}"></div>

<footer th:replace="~{fragments/common_footer::common_footer}"></footer>

<!-- 사이드바 동적 메뉴 생성 -->
<script th:inline="javascript">
    document.addEventListener('DOMContentLoaded', () => {
        // 사이드바 카테고리 로드 함수 실행
        loadSidebarCategories();
    });

    async function loadSidebarCategories() {
        const container = document.getElementById('dynamic-category-list');
        if(!container) return;

        try {
            const response = await fetch('/api/categories');
            const categories = await response.json();

            console.log(categories);

            container.innerHTML = '';

            categories.forEach(cat => {
                const li = document.createElement('li');

                console.log(cat);


                // <span class="badge badge-sm">${cat.postCount}</span>
                li.innerHTML = `
                            <a href="/posts?category=${cat.id}" class="flex justify-between">
                                <span>${cat.id === 0 ? '📂 미분류' : '📂 '+cat.categoryName}</span>
                            </a>
                        `;
                container.appendChild(li);
               /* if (cat.categoryName) {
                }*/
            });
        } catch (error) {
            console.error("사이드바 로드 실패:", error);
        }
    }
</script>


</body>
</html>
