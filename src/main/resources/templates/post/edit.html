<!DOCTYPE html>
<html lang="ko" layout:decorate="~{layouts/base_layout}"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>게시글 수정</title>
</head>
<body>

<div class="container mx-auto p-4" layout:fragment="contents">

    <h2 class="text-2xl font-bold mb-6 text-primary">게시글 수정</h2>

    <form class="space-y-6" method="post" th:action="@{/posts/{postId}/edit(postId=${post.id})}">

        <!-- 제목 입력 -->
        <div class="form-control w-full">
            <label class="label" for="postName">
                <span class="label-text font-semibold">제목</span>
            </label>
            <input class="input input-bordered w-full focus:input-primary"
                   id="postName"
                   name="postName"
                   required
                   th:value="${post.postName}"
                   type="text">
        </div>

        <!-- 카테고리 선택 -->
        <div class="form-control w-full">
            <label class="label" for="categoryId">
                <span class="label-text font-semibold">카테고리</span>
            </label>
            <select class="select select-bordered w-full focus:select-primary" id="categoryId"
                    name="categoryId">
                <option th:selected="${selectedCategoryId == 0}" value="0">
                    카테고리 없음
                </option>
                <option th:each="category : ${categories}"
                        th:if="${category.id != 0}"
                        th:selected="${category.id == selectedCategoryId}"
                        th:text="${category.categoryName}"
                        th:value="${category.id}">
                    카테고리명
                </option>
            </select>
        </div>

        <!-- 공개 여부 (체크박스 스타일) -->
        <div class="form-control w-fit">
            <label class="label cursor-pointer gap-4">
                <span class="label-text font-semibold">공개 설정</span>
                <input class="checkbox checkbox-primary"
                       name="isOpen"
                       th:checked="${post.isOpen}"
                       type="checkbox">
            </label>
        </div>

        <!-- 내용 입력 -->
        <div class="form-control w-full">
            <label class="label" for="content">
                <span class="label-text font-semibold">내용</span>
            </label>
            <textarea class="textarea textarea-bordered w-full h-[40vh] text-base focus:textarea-primary"
                      id="content"
                      name="content"
                      required
                      th:text="${post.content}"></textarea>
        </div>

        <!-- 하단 버튼 영역 -->
        <div class="flex flex-col sm:flex-row justify-end gap-3 pt-4 border-t border-base-200">
            <button class="btn btn-primary sm:w-32" type="submit">수정 완료</button>
        </div>
    </form>

    <!-- 링크 영역 -->
    <div class="flex justify-between items-center mt-6 text-sm">
        <a class="link link-hover flex items-center gap-1" th:href="@{/posts/{postId}(postId=${post.id})}">
            <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"
                 xmlns="http://www.w3.org/2000/svg">
                <path d="M10 19l-7-7m0 0l7-7m-7 7h18" stroke-linecap="round" stroke-linejoin="round"
                      stroke-width="2"/>
            </svg>
            상세 화면으로
        </a>
        <a class="link link-hover" href="/posts">목록으로 이동</a>
    </div>
</div>
