<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/base_layout}">
<head>
    <title>메인 페이지</title>
</head>
<body>

<!-- 본문 내용 (index.html 등에서 채워짐) -->
<!-- .mx-auto.mt-4 대신 공백으로 구분한 클래스명을 사용하세요 -->
<div class="container mx-auto p-4" layout:fragment="contents">

    <!-- 게시판 목록 테이블 -->
    <div class="overflow-x-auto">
        <table class="table w-full">
            <thead>
            <tr>
                <th>번호</th>
                <th>제목</th>
                <th>작성자</th>
                <th>공개 여부</th>
                <th>작성일</th>
                <th>조회수</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="post : ${postList}" class="hover">
                <td th:text="${post.id}">id</td>
                <td>
                    <a th:href="@{/posts/{id}(id=${post?.id})}" th:text="${post?.postName}">제목</a>
                </td>
                <td th:text="${post.userName}">userName</td>
                <td th:text="${post.isOpen ? '공개' : '비공개'}">공개</td>
                <td th:text="${#strings.substring(#strings.replace(post.createdAt, 'T', ' '), 0, 16)}">2026-05-07 16:27</td>
                <td th:text="${post.viewCount}">0</td>
            </tr>
            </tbody>
        </table>
    </div>

    <!-- 페이지네이션 및 글쓰기 버튼 영역 -->
    <div class="flex justify-between items-center mt-6">
       <!-- <div>
            <a href="#" class="btn btn-error">글삭제</a>
        </div>--> <!-- 빈 공간 -->

        <div class="join">
            <button class="join-item btn" th:onclick="|location.href='/posts?category=${categoryId}&page=${prevPage}'|">이전</button>
            <button class="join-item btn" th:onclick="|location.href='/posts?category=${categoryId}&page=${nextPage}'|">다음</button>
        </div>

        <a href="/posts/write" class="btn btn-primary">게시글 작성</a>
    </div>

</div>
</body>
</html>
