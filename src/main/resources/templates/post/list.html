<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/base_layout}">
<head>
    <title>메인 페이지</title>
</head>
<body>

<!-- 본문 내용 (index.html 등에서 채워짐) -->
<!-- .mx-auto.mt-4 대신 공백으로 구분한 클래스명을 사용하세요 -->
<div class="container mx-auto p-4" layout:fragment="contents">

    <!-- 검색창 영역 -->
    <div class="flex justify-end mb-4">
        <div class="flex flex-col gap-2 p-4">
            <div class="form-control">
                <label class="label cursor-pointer justify-start gap-3">
                    <input type="checkbox" class="checkbox checkbox-primary" />
                    <span class="label-text">공개</span>
                </label>
            </div>

            <div class="form-control">
                <label class="label cursor-pointer justify-start gap-3">
                    <input type="checkbox" class="checkbox checkbox-secondary" />
                    <span class="label-text">비공개</span>
                </label>
            </div>
        </div>

    </div>

    <!-- 게시판 목록 테이블 -->
    <div class="overflow-x-auto">
        <table class="table w-full">
            <thead>
            <tr>
                <th>번호</th>
                <th>제목</th>
                <th>작성자</th>
                <th>공개 여부</th>
                <th>작성일</th>
                <th>조회수</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="post : ${postList}" class="hover">
                <td th:text="${post.id}">id</td>
                <td>
                    <a th:href="@{/posts/{id}(id=${post?.id})}" th:text="${post?.postName}">제목</a>
                </td>
                <td th:text="${post.userName}">userName</td>
                <td th:text="${post.isOpen ? '공개' : '비공개'}">공개</td>
                <td th:text="${post.createdAt}">createdAt</td>
                <td th:text="${post.viewCount}">viewCount</td>
            </tr>
            </tbody>
        </table>
    </div>

    <!-- 페이지네이션 및 글쓰기 버튼 영역 -->
    <div class="flex justify-between items-center mt-6">
        <div>
            <a href="#" class="btn btn-error">글삭제</a>
        </div> <!-- 빈 공간 -->

        <!--<div class="join">
            <button class="join-item btn">«</button>
            <button class="join-item btn btn-active">1</button>
            <button class="join-item btn">2</button>
            <button class="join-item btn">3</button>
            <button class="join-item btn">4</button>
            <button class="join-item btn">»</button>
        </div>-->

        <a href="/posts/write" class="btn btn-primary">게시글 작성</a>
    </div>

</div>
</body>
</html>
